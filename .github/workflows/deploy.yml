name: Deploy Flask Application

on:
    push:
        branches:
            - main

jobs:
    deploy:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout Repository
              uses: actions/checkout@v4

            - name: Configure AWS Credentials
              uses: aws-actions/configure-aws-credentials@v4
              with:
                  aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
                  aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
                  aws-region: ${{ secrets.AWS_REGION }}

            - name: Login to Amazon ECR
              id: login-ecr
              uses: aws-actions/amazon-ecr-login@v2

            - name: Build Docker Image
              run: |
                  docker build -t flask-app ./app

            - name: Tag Docker Image
              run: |
                  docker tag flask-app:latest \
                  ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com/flask-app:latest

            - name: Push Docker Image
              run: |
                  docker push \
                  ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com/flask-app:latest

            - name: Configure kubectl
              run: |
                  aws eks update-kubeconfig --region ${{ secrets.AWS_REGION }} --name flask-eks

            - name: Deploy with Helm
              run: |
                  helm upgrade --install flask ./Helm/flask-app
